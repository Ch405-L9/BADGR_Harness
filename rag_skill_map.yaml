# RAG Skill → Corpus Query Mapping
# Maps skill profiles to search terms that retrieve relevant badgr_corpus docs.
# Used by harness to augment job scoring with knowledge base context.

skill_corpus_map:

  ai-sw-engineer:
    label: "AI Software Engineer & Developer"
    corpus_queries:
      - "LLM integration prompt engineering"
      - "machine learning production deployment"
      - "NLP natural language processing pipeline"
      - "vector database embeddings RAG"
      - "AI fine-tuning model training"
    rag_k: 3

