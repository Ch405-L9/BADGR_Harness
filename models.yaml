models:
  qwen_supervisor:
    provider: ollama
    model_name: qwen2.5:14b
    roles:
      - supervisor
      - planner
      - synthesizer
      - escalation
    strengths:
      - long_context_reasoning
      - structured_output
      - synthesis
      - recovery
    weaknesses:
      - slower_than_7b_models
      - higher_local_resource_use
    temperature: 0.2
    max_tokens: 2400
    timeout_seconds: 180
    fallback: null

  qwen_coder_worker:
    provider: ollama
    model_name: qwen2.5-coder:7b
    roles:
      - code
      - formatting
    strengths:
      - code_generation
      - code_editing
      - json_friendly
      - fast_enough
    weaknesses:
      - weaker_on_ambiguous_planning
    temperature: 0.1
    max_tokens: 1600
    timeout_seconds: 120
    fallback: mistral_worker

  badgr_analyst:
    provider: ollama
    model_name: badgr-analyst:latest
    roles:
      - analyst
      - classification
      - extraction
      - market_intel
    strengths:
      - domain_specialized
      - badgr_context_aware
      - classification_accuracy
      - data_extraction
    weaknesses:
      - unknown_base_model_limits
    temperature: 0.1
    max_tokens: 1600
    timeout_seconds: 120
    fallback: mistral_worker

  dmape_qwen:
    provider: ollama
    model_name: dmape-qwen:latest
    roles:
      - content
      - marketing
      - social
    strengths:
      - marketing_content
      - badgr_brand_aware
    weaknesses:
      - narrow_specialization
    temperature: 0.2
    max_tokens: 1600
    timeout_seconds: 120
    fallback: mistral_worker

  mistral_worker:
    provider: ollama
    model_name: mistral:7b
    roles:
      - general
      - fallback
      - summarization
    strengths:
      - instruction_following
      - solid_fallback
      - cheap_local_backup
    weaknesses:
      - weaker_than_supervisor_on_complex_synthesis
    temperature: 0.1
    max_tokens: 1600
    timeout_seconds: 120
    fallback: qwen_supervisor

  llama_micro:
    provider: ollama
    model_name: llama3.2:3b
    roles:
      - micro_classifier
      - pre_router
    strengths:
      - fast
      - low_resource
      - adequate_classification
    weaknesses:
      - shallow_reasoning
      - not_for_main_work
    temperature: 0.0
    max_tokens: 50
    timeout_seconds: 30
    fallback: null
